name: Enterprise CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  VERSION: v1.0.${{ github.run_number }}

jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, cartservice, checkoutservice, productcatalogservice]
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4



      - name: Convert GitHub Repository Owner to Lowercase
        run: echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set Docker Context Path
        run: |
          if [ "${{ matrix.service }}" == "cartservice" ]; then
            echo "DOCKER_CONTEXT=./src/cartservice/src" >> $GITHUB_ENV
          else
            echo "DOCKER_CONTEXT=./src/${{ matrix.service }}" >> $GITHUB_ENV
          fi

      - name: Build Docker Image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ matrix.service }}:${{ env.VERSION }} ${{ env.DOCKER_CONTEXT }}

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ matrix.service }}:${{ env.VERSION }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image to GHCR
        if: github.event_name == 'push'
        run: docker push ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ matrix.service }}:${{ env.VERSION }}
