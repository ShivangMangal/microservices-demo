name: Enterprise CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  VERSION: v1.0.${{ github.run_number }}

jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, cartservice, checkoutservice, productcatalogservice]
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'cartservice' && './src/cartservice/src' || format('./src/{0}', matrix.service) }}
          push: false 
          load: true
          tags: ${{ env.REGISTRY }}/shivangmangal/${{ matrix.service }}:${{ env.VERSION }}

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/shivangmangal/${{ matrix.service }}:${{ env.VERSION }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image to GHCR
        if: github.event_name == 'push'
        run: docker push ${{ env.REGISTRY }}/shivangmangal/${{ matrix.service }}:${{ env.VERSION }}
